<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Criar seu Portfólio Profissional - Primeiro Acesso</title>
</head>
<body>
    <div class="container">
        <h2>Criar seu Portfólio Profissional - Primeiro Acesso</h2>
        <form action="/submit-form" method="post">
            <fieldset>
                <legend>Informações Pessoais</legend>
                <div class="form-group">
                    <label for="nomeCompleto">Nome Completo:</label>
                    <input type="text" id="nomeCompleto" name="nomeCompleto" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" value="email@example.com" readonly>
                </div>
                <div class="form-group">
                    <label for="phone">Telefone <span class="required">*</span></label>
                    <input type="tel" id="phone" name="phone" placeholder="(99) 99999-9999" pattern="\(\d{2}\)\s\d{5}-\d{4}" title="Número de telefone no formato (99) 99999-9999" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Senha</legend>
                <div class="form-group">
                    <label for="senha">Senha (Máximo 16 caracteres):</label>
                    <input type="password" id="senha" name="senha" maxlength="16" required>
                </div>
                <div class="form-group">
                    <label for="confirmar-senha">Confirmar senha (Máximo 16 caracteres):</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" maxlength="16" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Informações Profissionais</legend>
                <div class="form-group">
                    <label for="profissao">Profissão:</label>
                    <input type="text" id="profissao" name="profissao" required>
                </div>
                <div class="form-group">
                    <label for="areaAtuacao">Área de Atuação:</label>
                    <select id="areaAtuacao" name="areaAtuacao" required>
                        <option value="">Selecione...</option>
                        <option value="design">Design</option>
                        <option value="programacao">Programação</option>
                        <option value="marketing">Marketing</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="anosExperiencia">Anos de Experiência:</label>
                    <input type="number" id="anosExperiencia" name="anosExperiencia" min="0" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Preferências de Portfólio</legend>
                <div class="form-group">
                    <label>Escolha o estilo do seu portfólio:</label>
                    <div class="checkbox-group">
                        <input type="checkbox" id="moderno" name="estiloPortfolio[]" value="moderno">
                        <label for="moderno">Moderno</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="classico" name="estiloPortfolio[]" value="classico">
                        <label for="classico">Clássico</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="criativo" name="estiloPortfolio[]" value="criativo">
                        <label for="criativo">Criativo</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="outro" name="estiloPortfolio[]" value="outro">
                        <label for="outro">Outro:</label>
                        <input type="text" id="outroEstilo" name="outroEstilo">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Informações Adicionais</legend>
                <div class="form-group">
                    <label for="objetivos">Objetivos com este portfólio:</label>
                    <textarea id="objetivos" name="objetivos" required></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Upload de Foto de Perfil</legend>
                <div class="form-group">
                    <input type="file" id="fotoPerfil" name="fotoPerfil" accept="image/*">
                </div>
            </fieldset>

            <fieldset>
                <legend>Redes Sociais (Opcional)</legend>
                <div class="form-group">
                    <label for="linkedin">LinkedIn:</label>
                    <input type="url" id="linkedin" name="linkedin" placeholder="https://www.linkedin.com/in/seuperfil">
                </div>
                <div class="form-group">
                    <label for="github">GitHub:</label>
                    <input type="url" id="github" name="github" placeholder="https://github.com/seuperfil">
                </div>
                <div class="form-group">
                    <label for="outraRede">Outra Rede Social:</label>
                    <input type="url" id="outraRede" name="outraRede" placeholder="https://...">
                </div>
            </fieldset>

            <fieldset>
                <legend>Configurações de Privacidade</legend>
                <div class="form-group">
                    <label>Quem pode visualizar seu portfólio:</label>
                    <div class="radio-group">
                        <input type="radio" id="publico" name="visibilidade" value="publico" checked>
                        <label for="publico">Público</label>
                    </div>
                    <div class="radio-group">
                        <input type="radio" id="privado" name="visibilidade" value="privado">
                        <label for="privado">Privado (Somente com link direto)</label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Aceitação dos Termos</legend>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="termos" name="termos" required>
                        <label for="termos">Li e concordo com os <a href="#">Termos de Serviço</a> e <a href="#">Política de Privacidade</a>.</label>
                    </div>
                </div>
            </fieldset>

            <div class="form-group">
                <button type="submit">Criar Portfólio</button>
            </div>
        </form>
    </div>
</body>
</html>
